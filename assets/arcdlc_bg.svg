<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="1200" height="420" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" role="img" aria-label="ArcDLC — the agent-native Architecture Development Life Cycle">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A0F1E"/>
      <stop offset="0.55" stop-color="#0E1730"/>
      <stop offset="1" stop-color="#12203E"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#818CF8"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.8" cy="0.32" r="0.62">
      <stop offset="0" stop-color="#1E40AF" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#0A0F1E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38BDF8"/>
      <stop offset="0.5" stop-color="#818CF8"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#818CF8"/>
    </marker>
  </defs>

  <!-- backdrop -->
  <rect width="1200" height="420" rx="18" fill="url(#bg)"/>
  <rect width="1200" height="420" rx="18" fill="url(#glow)"/>

  <!-- blueprint grid -->
  <g stroke="#3B5588" stroke-width="1" opacity="0.10">
    <path d="M0 60 H1200 M0 120 H1200 M0 180 H1200 M0 240 H1200 M0 300 H1200 M0 360 H1200"/>
    <path d="M60 0 V420 M120 0 V420 M180 0 V420 M240 0 V420 M300 0 V420 M360 0 V420 M420 0 V420 M480 0 V420 M540 0 V420 M600 0 V420 M660 0 V420 M720 0 V420 M780 0 V420 M840 0 V420 M900 0 V420 M960 0 V420 M1020 0 V420 M1080 0 V420 M1140 0 V420"/>
  </g>

  <!-- lifecycle motif: the arc + four stages -->
  <g transform="translate(955 210)">
    <circle r="132" fill="none" stroke="#33507F" stroke-width="1.5" stroke-dasharray="3 7" opacity="0.6"/>
    <!-- sweeping arc (the "cycle") -->
    <path d="M 0 -118 A 118 118 0 1 1 -102.3 59" fill="none" stroke="url(#ring)" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
    <!-- stage nodes -->
    <g>
      <circle cx="0" cy="-118" r="9" fill="#0A0F1E" stroke="url(#accent)" stroke-width="4"/>
      <circle cx="118" cy="0" r="9" fill="#0A0F1E" stroke="url(#accent)" stroke-width="4"/>
      <circle cx="0" cy="118" r="9" fill="#0A0F1E" stroke="url(#accent)" stroke-width="4"/>
      <circle cx="-118" cy="0" r="9" fill="#0A0F1E" stroke="url(#accent)" stroke-width="4"/>
    </g>
    <!-- stage labels -->
    <g fill="#CBD5E1" font-size="15" font-weight="600" letter-spacing="1" text-anchor="middle">
      <text x="0" y="-138">AIC</text>
      <text x="118" y="-16" text-anchor="start" dx="16" dy="6">PLAN</text>
      <text x="0" y="150">EXECUTE</text>
      <text x="-118" y="-16" text-anchor="end" dx="-16" dy="6">ARCHIVE</text>
    </g>
    <!-- hub -->
    <circle r="4" fill="#818CF8"/>
  </g>

  <!-- wordmark + copy -->
  <g>
    <text x="80" y="176" font-size="104" font-weight="800" letter-spacing="-2" fill="#F8FAFC">Arc<tspan fill="url(#accent)">DLC</tspan></text>
    <text x="86" y="222" font-size="19" font-weight="600" letter-spacing="5" fill="#7C93B8">ARCHITECTURE&#160;&#160;DEVELOPMENT&#160;&#160;LIFE&#160;&#160;CYCLE</text>
    <text x="86" y="286" font-size="26" font-weight="500" fill="#DCE6F5">From architecture interview to audited,</text>
    <text x="86" y="320" font-size="26" font-weight="500" fill="#DCE6F5">task-by-task delivery — driven by your agent.</text>
    <g transform="translate(86 358)">
      <rect x="0" y="0" width="330" height="30" rx="15" fill="#132546" stroke="#2E4880" stroke-width="1"/>
      <text x="18" y="20" font-size="15" font-weight="600" letter-spacing="0.5" fill="#8FB4E8">Claude Code&#160;&#160;·&#160;&#160;Codex&#160;&#160;·&#160;&#160;OpenCode</text>
    </g>
  </g>
</svg>
