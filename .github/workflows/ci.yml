name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: gofmt
        run: |
          out="$(gofmt -l .)"
          if [ -n "$out" ]; then
            echo "gofmt needs to be run on:" >&2
            echo "$out" >&2
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

      - name: Validate plugin manifests
        run: |
          jq -e '.name == "arcdlc"' .claude-plugin/plugin.json
          jq -e '.plugins | length > 0' .claude-plugin/marketplace.json

      - name: Check skill layout
        run: |
          for skill in aic archive examinate execute plan policy source-map; do
            test -f "skills/$skill/SKILL.md" || { echo "missing skills/$skill/SKILL.md" >&2; exit 1; }
          done

      - name: shellcheck installer
        run: shellcheck install.sh

      - name: Installer smoke test
        run: |
          export FAKE="$RUNNER_TEMP/fakehome"
          mkdir -p "$FAKE/.claude" "$FAKE/.codex" "$FAKE/.config/opencode"
          HOME="$FAKE" ARCDLC_NO_PLUGIN_CLI=1 ./install.sh --bindir "$FAKE/bin"
          test -f "$FAKE/.claude/skills/arcdlc/.claude-plugin/plugin.json"
          test -f "$FAKE/.claude/skills/arcdlc/skills/plan/SKILL.md"
          for s in aic archive examinate execute plan policy source-map; do
            test -f "$FAKE/.codex/skills/arcdlc-$s/SKILL.md"
            test -f "$FAKE/.config/opencode/skills/arcdlc-$s/SKILL.md"
          done
          "$FAKE/bin/arctool" version
          HOME="$FAKE" ./install.sh --uninstall --bindir "$FAKE/bin"
          test ! -e "$FAKE/.claude/skills/arcdlc"
          test ! -e "$FAKE/bin/arctool"

  build:
    name: Cross-compile
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build all platforms
        run: make release

      - uses: actions/upload-artifact@v4
        with:
          name: arctool-binaries
          path: dist/
          retention-days: 14
